baseURL: https://baggiponte.com/
languageCode: en-us
title: AI Field Notes

author:
  name: baggiponte

module:
  imports:
    - path: github.com/imfing/hextra

params:
  navbar:
    displayLogo: false
    displayTitle: true
    width: full

  theme:
    default: light
    displayToggle: true

  dateFormat: "January 2, 2006"

  blog:
    list:
      displayTags: true
      orderBy: "date"
      order: "desc"
    article:
      displayPagination: false

  toc:
    displayTags: false

  footer:
    enable: false
    # displayCopyright: true
    # displayPoweredBy: true

menu:
  main:
    - identifier: blog
      name: Blog
      url: /blog/
      weight: 1
    - identifier: talks
      name: Talks
      url: https://sessionize.com/lucabaggi/
      weight: 3
    - name: Search
      weight: 7
      params:
        type: search
    - identifier: theme-toggle
      name: Theme
      weight: 8
      params:
        type: theme-toggle

taxonomies:
  tag: tags
  category: categories

markup:
  highlight:
    noClasses: false
    lineNos: false
